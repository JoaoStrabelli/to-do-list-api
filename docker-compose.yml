services:
  postgres:
    image: postgres:16
    container_name: todolist-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todolist
    ports:
      - "5432:5432"
    volumes:
      - todolist_postgres_data:/var/lib/postgresql/data

volumes:
  todolist_postgres_data: